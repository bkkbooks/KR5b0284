front:
  text: 養生祕録大九
  hash: sha256:33311fa0a70a73a2fcb0c536c6e791a6a12e05693fd549523502baad1f7f026a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0284_HFL_000-001a, image: hfl/0321/0321-130.png}
body:
  text: 玉溪子丹房語録心凝曰神凝神歸氣以鍊丹情復乎性復性歸根以飬命還丹之本鉛汞而已元精為命之根寶元精而真鉛自生元神乃性之宗嗇元精而真汞自産是知固精以養氣固氣以飬神鉛汞有時而相投駐息綿錦而成火候真氣無刻不相聚忘念久久而成金丹若真鉛走而真汞枯元神散而元精竭欲求返還不亦難乎非遇志人勿輕傳授保而重之祕之口訣外隂陽往來則外藥也內坎離輻輳則內藥也外有作用內則自然精氣神之用有二其體則一以外藥言之交合之精先要不漏呼吸之氣更要細細至於無息思慮之神貴在乎安靜以內藥言之鍊精鍊元精抽坎中之元陽也元精固則交合之精自不泄矣鍊氣鍊元氣補離中之元隂也元氣住則呼吸之氣自不出入鍊神鍊元神也坎離合體成乾也元神凝則思慮之神泰定其上更有鍊虛一者非易輕言貴在默會心通可也勉旃勉旃玉虛子宜春心訣三千六百法養命數千家率皆旁門小法無非曲徑㒒閲歷參同僅三十載作規中圖十二字訣用傳學道君子以正心誠意為中心柱子處中以制外以熙和中和斂靜斂肅八字為輔調御四時由外以應中上合天心中稽人事默符造化順軌隂陽外法五行內理五臟以為日月循環無端不施為不存想晏然大定以總元機但要絶嗜欲定心氣省思慮節飲食調鼻息警昏睡慳視聽飬天和於四威儀四聰合自然之妙别無繁難也已立鄞鄂者以是契符火養聖胎未立鄞鄂者以是益元氣養精神為立鄞鄂之漸至於虛耗損失疾病交攻則以是驅疾固元為補益延年飬命之術可謂簡易法門矣宋咸淳己巳歲下元節宜春玉溪子李公明序規中者如居一規之中如大圓鏡之一我但正心誠意為主為中心柱子當萬慮俱泯之時真人出現如魚躍深淵遊泳自樂而不離方寸是也喜怒哀樂未發當此時可以居規中遊泳而潛御四時以正造化四威儀中不可失節焉物來則應應過復歸於中絶不可動著中心柱子於中常令空虛一塵不立久之不縱不拘自得受用其妙也六隂歸坤萬物荄元復赴建始萌長子絶父體一陽潛動處萬物未生時從這裏起便是作用處當斯時也跏趺大坐凝神內照調息綿綿默而守之則一氣從虛無中來杳杳冥冥無色無形非子玄冥坤癸之地生於腎中以育元精日益月強始之去痾次之返嬰積而為內丹之基本矣袁真人云元氣補元氣豈是凡砂石此補益之上法也朝屯者君子經綸之始是萬物萌芽之初仁之端也夫子時始生之氣在腎是不召而自來宜保而養之調息無令耳聞但聽有悠悠綿綿合乎自然則與天地橐籥相應久之則腎氣合心氣二氣之交感以降甘露而産玄珠焉暮蒙者以飬正聖功也使不失赤子之初心義之端也午時其始生之氣在心是亦不召而自來無思無慮冥心內照以合之靜坐而照久而則心合腎氣而成既濟之功焉人居三才之一一身之造化與天地等耳故日月常行天地之氣相應真一之精相符人之元氣八百一十丈與二氣橐籥相合所以元氣大運隨天小運隨日也但人生不能體天地造化之大以至作喪傷敗精神迷亂自與之違天地豈違者哉知道之士若能順理握機則可以符化工而為修丹內鍊長生久視之道也捨人之外總皆稟混淆而在元氣中均為化物耳又安能馭元氣也參同契云春夏據內體從子到辰巳秋冬當外用自午從戌亥又云賞罰應春秋昏明應寒暑久辭有仁義隨時發喜怒如是應四時五行得其理中黃內旨王真先生云無極中黃大道本是口傳心授不立文字吾今慈憫初生之士一時聞之不能記憶故設為此善巧方便令彼入耳注心眼觀神領傳度既畢即時焚之勿令泛之內旨曰夫天有九宫地有九州人有九竅天有中黃為太陽地有中黃為太隂人有中黃為丹扄俱名為中黃八極中言其位黃言真色故謂中黃八極者是八方總會要處又只是中宫即黃庭即玄牝即先天一氣即玄關一竅即至善之所即黃極之道即允執厥中在五行謂之土在五臟謂之脾在五常謂之信藥物三氣五神火候呼吸盡在是矣行住坐卧皆當注念不可須臾離也不廢人事但當正心處物當應常靜吾祖師所謂多言數窮不如守中又言三十輻共一轂輻者脅肋轂者中扃也又言天地之間其猶橐籥乎乃呼吸之謂也呼則腎氣升得土則止吸則心液降逢土則息即此謂水火煆鍊而成大丹若能存守則法無不靈吾常謂若要道法靈須是守中扄中者理得上下四隅不偏不倚之謂也天地相去八萬四千里人之心腎即一身之天地相去八寸四分以中指節文為則自臍上至鳩尾骨尖只有八寸四分今云臍者蓋與腎對也故心之下去三寸六分臍腎之上三寸六分惟中間一寸二分為黃庭主我身命所謂至聖之道祕之祕之三茅真君云精飬於氣氣會於神精神不散是曰修真子不離母母不離子子母持守長生不死洞真先生云謹守謹守莫言莫言自然自然玄之又玄聞道之士皆千生幸慶宿有仙緣或資談笑漏泄於人有不測之禍蔓延之災受授之後勤而行之玉溪真人云儒家堯舜禹湯文武周公孔子顏曽思孟歷代道統相傳即此道也升少慕清虛留心至道萬法千門無不師訪因遊衡嶽方遇至人密受紫陽仙翁丹訣按九宫八卦以年易月以月易日以日易時取天地之正氣奪造化之竒功納歸中宫交感成丹非止延年何似住世所謂我命在我不由天升自得之後體力不衰髮鬚不白日行百里舉動輕便神異證驗不可具述其間水火既濟又為坎離交會之法久而行之可以成丹今之人蓋火燥炎上水濕潤下自勾引隂邪之氣乘間而入令人多病夀夭若過此訣使之五行顛倒術龍從火裏出五行不順行虎向水中生順行則凡逆行則聖玄之又玄今悉于後訣曰一升便提氣氣歸臍一降便咽水火相見此十六字簡而易行不拘時候或在官府不妨政事雖處富貴不妨行用所謂至道不繁也如有風疾見效甚速但於日中少暇或盤膝或垂足正坐皆無所拘取鼻中出入息為候入息謂之吸即便升氣將下部微力前提其氣盡歸臍間此之謂氣氣歸臍蓋臍乃人之氣海所聚元氣盡藏於茲遇出息謂之呼即便放身自在一咽汩然有聲此謂之水火相見如是行之不計次數要行且行得止便止若能久持臍下常如火腹中氣響如雷小便漸減精氣不泄腰脊堅強飲食倍進百病去體外邪不侵行及一年宿有諸疾盡除行之既久自然三宫升降二氣循環遂成大道長生久視也昔年都下有過海王先生教人行持隨鼻出入息升降之法而不得提搐之法次有恩州李道人授楊和玉只教提搐之法而又不得出入息之法皆用其偏枯升因遊南嶽紫氣峰下親受李先生袐訣先生山東人也一百五嵗髮鬚不白面如童顏行步如飛豫得其傳行之既驗不敢自祕謹以傳好道之士四假錦一開臂二開胸三攪車四挽弓青霞翁丹經直指僕自幼學道弱冠棄家遍歷江湖求師問友得先師張悟真以來諸前烈丹經詩詞傳記熟讀精思尋文求義又嘗遍參道友術士訪名山洞天禱求石碑壁記得海瓊仙指迷大道之要後遇率然居士於朱陵洞天作詩章以相贈始得證海瓊之妙旨乃知年少所學所求所見巳是屋上架屋枝上接枝殊不知屋便是屋枝便是枝道在邇而求諸逺也一旦頓悟切恐湮沒無傳且念後之學者未必如此肯心留意因録數語以貽後人得之者可因文解意猛省用功雖不求師而在其中矣夫男子四大一身皆隂惟先天一氣真陽此氣非吹噓呼吸之氣亦無形影氣象可見故悟真先生以為可見不可用可用不可見也然此氣末受形之先在父母胎中先受此氣然後生二腎便生二眼由此生心生肝生脾生肺生九竅四肢而後人象具足也此氣只在兩腎中間名為玄牝之門先師玄牝歌言之詳世間人莫能悟之今人宰牲殺豬但見兩腎中間腰膂去處有一空膜中有此呼吸膨動直至內冷方息是也此氣未死之先氣血全盛魂魄相屬內含五采受氣如湯人一死則如牲畜氣血一散而氣餒矣只此一氣便是金丹大藥故先師以肝心脾肺膽腎腸精津液涕唾氣血為非道又以精神魂魄意似是非者此也人之一身右足太隂左足太陽而足為湧泉發水火二氣自雙足入尾閭上合於二腎左為腎堂右為精府一水一火一龜一蛇互相橐籥二腎之間虛生一竅是為玄牝二腎之氣貫通玄牝之間由此發黃赤二道上夾脊雙關貫二十四椎中通心腹入膏肓之下會於風府上朝泥丸由泥丸而下明堂散灌五宫下入重樓玉闕直注于絳宫復流入于本府日夜循環周流不息皆是自然而然即不是動手腳做成的今人流入旁門者不知虛無自然默默運用之理却乃妄行屈伸呵咽摩擦引導存思注視妄想妄作反致成疾如白蓮道人多黃腫運氣道人多氣蠱皆其驗也夫此一氣人人一般即無多少但有涵養的做得成無涵養的做不成其流行出入自有定數如海中潮候弦朔必應天上斗柄子午自移又若女子月經人病瘧疾應時而至確然不差此氣遇陽時為火隂時為水火即木液水即金精又左腎為坎右腎為離離中有巳坎中有戊以戊巳二土合為圭字又名水中金金者刀也故名刀圭又火即木水即金為金木無間水火同鄉其實金木水火只是一土一土為總五行爾先師以為五臟元氣六腑無精故謂此也此氣自然時時運轉不假人力凡言轆轤三車黃河曹溪取象如此非以人力強為也此氣常以子時而至為陽火午時而至為隂水以卯時而至為木液酉時而至為金精卯中有甲酉中有庚故須採取用甲庚子中有戊午中有已故運中土自非洞曉乾坤升降隂陽盛衰藥材老嫩水火潛亢之理不足以語此然先師言之甚詳而後甚惑言之愈多而後人愈疑者何也皆緣終於虛無無則不知下手功夫是以胎息不成而歸於頑空忽於自然溺於妄想強作是以心神枉費而返致疾夫虛無者言其不可見間蓋虛空中齊欲用工作貫通為實是也自然者言其不可以迎取今之採取火候等逐節工夫深淺之言句句分明節節謹切謹守奉行無不應驗凡未入室以前且理會得安鼎採藥每日夜且習打坐坐一定然則骨節關開脈通自膀胱至夾脊便如車輪運動先天一氣自然由三關朝泥丸下重樓入絳宫然其來有時而採亦有時須得甲庚金木旺相之時默默端坐不須用摩動須臾覺頂中火熱喉中甘露垂垂滴而下便以目內視一意以內送納之絳宫玄牝而止凡一日之間以甲應上弦庚應下弦自子至卯為上弦得汞半斤自午至酉為下弦得鉛半斤採甲汞庚鉛各半斤自然定數所謂鉛見癸生須急採者言木汞金鉛以甲庚二時採取也如此採取之法然初採之時不計年月久久積之方成鼎罏天一身罏也絳宫鼎也今人以脾中黃庭頂中泥丸為鼎皆非也年月既久罏鼎方成然後種藥藥物一生且採且鍊採而積之為藥鍊而成之為火採之一日有一斤數鍊之一日有銖之得採藥之時須採甲庚旺氣行火之法則忌甲庚沐浴有此不同云採之法亦如鼎然不過目其自然之來迎之以意送之以目故丹書有黃婆青女之説黃婆意也青女眼也以意迎逢謂之黃婆媒合以目內送謂之青女傳言人身之氣隨意而動意行即行意止即止故送入鼎中隨意即止不復下流矣謂之種藥藥既入鼎然後有火候焉聖人傳藥不傳火以火與藥同歸殊途同情異功故爾子為一陽至巳為六陽自子至巳火得六數而六陽成乾當其子至巳以意迎之謂之進火謂之添午為一隂至亥為六隂自午至亥水得六數而六隂成坤以意送之謂之退火謂之抽故子巳為火午亥為水言火不言水者添進為火抽退為水耳自然而然不假人為丹經言河圖洛書之數者言其火候自然與此生成之數合也非必待用力而合此數也言朝屯暮蒙晝姤夜復亦言與卦默合非必用力而方合此卦爻也如運用之説則言此氣運行流灌五臟百脈如亥子水旺腎寅卯旺肝巳午旺心申酉旺肺辰戌丑未旺脾自然此氣運行由旺宫而出亦不必妄想此時此臟有此氣出入流運然採取造鼎之初則無禁忌時至即為既了即了至如入藥行火則須擇日入室一毫俗事不可妄干使耳目鼻口四象相忘胸中淡然虛室生白一有所著便是封固不密藥物走漏便非道也既居室內惟半飢半飽不可求睡每使胸次惺然常常提醒見藥即採遇火即行一年之內止除卯酉二月不行水火以其卯則木旺酉則金旺木旺則火旺金旺則水旺故耳凡此二月不行水火者蓋行則返過而傷也一年十二月內除卯酉二月外止存十月故十月而胎成過十月又不須行火則又謂之傷丹此謂火候十月胎成移入泥丸謂之換鼎此胎氣既足如人巳生但須乳哺故換鼎入泥丸乳哺之謂此時不須工夫火候亦無沐浴但只常常溫養之如此三年九載則天門自開嬰兒自然出矣往來無礙而位登仙翁矣此首尾用工之説皆出自然不假人力強為妄想不過及時以意迎之而巳此是積日纍月造鼎安爐一年十月結胎行火先師以為一日金丹赫赫紅是也又謂頃刻可成者何也言一時半日之工夫可奪一年半紀之造化當其藥生之時不過頃刻迎逢謂之頃刻金丹即非終日終夜勞神苦思強為之也夫藥罏鼎火候沐浴胎息嬰兒運用抽添主賔浮沉升降鉛汞水火真土金精木液一切言説皆是假名換姓其實只為一物鈎鎖連環自可熟論見義其有用工下手虛無自然之説先師許多丹經詞訣盡矣參同吻合一以貫之不過如此而巳然言之非艱行之為艱行之亦非艱守之為艱何以守之為艱大抵旁門小法俱無報應惟金丹一件便有報應今人採藥年少者須半年功夫守齋戒沐浴絶欲忘念靜坐默取採之候時節到來耳目手足輕健百病俱無自然兩腎火起夾脊如車輪泥丸如湯澆口中常有甘露滴滴而來若能不睡存神不絶不過兩月餘得目生神光此心明了也若有慧性此之驗也得之者不可便以為至道否則狂念一生遂成顛風至若三月行火之餘時刻工夫不差則九竅光明頭有金輪洞視內外逺接鬼神當此之時嬰兒巳成形象不可便縱其運動出入須加緊護牢收否則火漏丹敗十月既滿嬰兒受氣巳足自然如瓜果之熟脫蒂而去然後出入往來可以移身丈尺逺則不可逺出一出便還須收回否則神一奪而迷途遂至投胎托化不復顧屋廬矣直須三年九載日子滿足骨格老成如人生十數載知人事深淺輕重方可縱其自然往來出入此則飛升變化證真仙位矣然猶有魔障焉當其入定坐忘之時而聰明倍生神異百出凡天下竒竒怪怪之事生前死後神仙希遇之事鬼怪驚怖之狀並集於前直如慧眼神見又若神明依附此魔障之來不可便以為道須耍定見把握一念凝堅所謂太玄之一守其真形是也切不可見妄為真從情為性如此守一方能成道今人多如此時無定力定見故為外邪所附不為學道無成及致墜墮遂以為神仙有無何渺茫惜哉僕平生讀書結友參師問道躬行力踐所見功驗如此并以告之未來學者有志之士得而誦之尋文求義參之先師丹經遺論求之道藏玄文祕旨一一皆合但能依此修行之十月胎成移鼎溫養之後又參向上一著方可看悟真下篇求精進法又當自然有希有之遇有不言傳者若不如此次第行之則身中無主嬰兒不育妄參禪學如水之無源木之無根覺成頑空頑空之下不思工字用工丹田合一方是貫通之理一有走漏到老無成終歸輪回惡趣皆思平日空下工夫修錬成丹合一成真方是貫通誠實也再用丹田修鍊成珍則脫體化神方是寶也修得實寶在身丹成之後修成深淺把握定否如何有報應却是用功處一時不可怠忽一步不可放縱就中飛升為上尸解為次奪舍又次之投胎為下矣至如飛升長生久視一也尸解二也二者尤須功圓行滿有代天宣化濟物利人之功方能及此若無功行但足以增年益壽亦不能為仙矣何以言之神一去而不回則氣一絶而不蘇上則奪舍下則投胎又下為無著之魂僕痛惜愚惑之徒談道者千萬功成者一二故并述以為來者之戒不揆輕泄冒成此書後之作者得玩味披研如對師資如見君父珍藏什襲永為身實非人勿示非人勿傳有違此語先禍其身後及九祖墮沉無間永無出期時咸淳甲子秋望日書于朱陵洞天大道歌道不遠在身中物即皆空性不空性若不空神氣住氣歸元海壽無窮欲得身中神不出莫向靈臺留一物物在身中神不清耗散真精損筋骨神御氣氣留形不須雜術自長生術則易知道難遇幾人遇了不専行所以千人萬人學畢竟終無一二成神若出便收來神返身中氣自回如此朝朝與暮暮自然赤子産真胎金鎖乃玄關處玉匙即元氣也靜坐之際調鼻中之息規守中扃以得定處自然神息綿綿不可以一毫别念待調息以勻鼻中自覺無出入息但存中去處一念堅固以元氣呼吸息納於玄關忽覺一聲其關即開當時自有所見之趣工夫至此中字方洞徹矣金鼎欲留砂裹汞金鼎是中字又即鼎罏中間欲留存砂裏汞是元精也玉池先下水中銀玉池是華池水是神水也金鼎中欲留其汞靜坐間先守中扄中扄若守得定了出入息自然微默微默之後自覺息定元氣自在內藏呼吸待身體自覺混融恍不知有物有自身有天地後如此華池水自來待得滿口一咽汨然有聲就下以意送至中扄中扄玄開處汩然一聲響似開鎖恁時就閉目回照顧已內境自靈異景象不可盡述之耳金丹問答問曰如何謂之金液還丹答曰金液者金水也金為水母母隱子胎因有還丹之號也前賢有曰丹者丹田也液者肺液也以肺液還於丹田故曰金液還丹問曰何謂鉛汞答曰非凡黑錫水銀也真一子曰鉛是天地之父毋隂陽之根基蓋聖人採天地父母之根而為大丹之基採隂陽純粹之精而為大丹之質且非常物造作也汞性好飛遇鉛乃結以其子母相戀也問曰何謂火答曰火者太陽真氣乃坎中之陽也紫清真人曰坎中起火是也問曰何謂候答曰五日為一候是甲子一終也日有十二時五日六十時終一甲子也紫陽曰一刻之工夫自有一年之節以起火之際頃刻一周天是也問曰此火候如何答曰日中用月月中用日日中用時時中用刻也問曰何謂真一答曰人能將自己天真安於天谷之內乃守真一之道也金洞主云真一者在於北極太淵之中也問曰何謂動靜答曰陽主動隂主靜翠虛曰動中求靜靜中有為動靜有作口口傳之問曰何謂九還答曰金生四成數九還者自上而還下九乃老陽之數隂真君曰從子至申為九還亦順也問曰何謂七返答曰火生二成數七返者自下而返上也乃少陽之數隂真君曰從寅至申為七返逆行也問曰何謂罏答曰上品丹法以神為罏以性為藥以定為水以慧為火中品丹法以神為罏以氣為藥以日為火以月為水下品丹法以身為罏以氣為藥以心為火以腎為水又有偃月罏問曰何謂鼎答曰鮑真人云金鼎近泥丸黃帝鑄九鼎是也問曰何謂藥物答曰即此藥物順則成人逆則成丹五行顛倒大池七寶五行順行法界火坑百姓日用而不知也紫清曰採藥物於不動之中是也問曰何謂神水華池答曰李筌云還丹之要在於神水華池紫陽曰以鉛入汞名曰神水以汞投鉛名曰華池海蟾曰從來神水出髙源紫清曰華池正在氣海內問曰何謂三關答曰頭為天關足為地關手為人關問曰何謂內三要答曰第一要太淵池也第二要絳宫也第三要地户也問曰何謂外三要答曰口之與鼻共三竅是神氣往來之門户下工之際調鼻息緘舌氣閉兊也問曰何謂兊答曰真一子云兊口也問曰嬰兒姹女正在何處答曰嬰兒在腎姹女在心問曰腎屬水為隂嬰兒屬陽心屬火為陽姹女屬隂何緣居此答曰腎屬坎隂中有陽乃真陽也心屬離陽中有隂乃真隂也問曰泥丸宫正在何處答曰頭有九宫中曰泥丸問曰何謂金公答曰金邊著公乃鉛也紫陽曰要能制伏覔金公問曰何謂黃婆答曰黃乃土也色位屬坤因取名焉紫清曰金公無言姹女死黃婆不老猶懷胎問曰呼吸何如答曰呼則出心與肺吸則入腎與肝呼則接天根吸則接地根呼則龍吟雲起吸則虎嘯風生呼吸風雲凝成金液問曰何謂瓊漿玉液答曰皆神水也問曰何謂神氣答曰神是火火屬心氣是藥藥屬身神氣子母也虛靖天師云氣者生之元神者生之制持滿馭神專氣抱一神依氣住相合乃可長生三茅真君曰氣是添年藥心為使氣神若知行氣主便是得仙人問曰何謂十二重樓答曰人之喉嚨管有十二節是也問曰何謂簾幃答曰眼是也下功之際含光雲房曰閉戶垂簾默默窺問曰何謂子午答曰子午乃天地之中也在天為日月在人為心腎在時為子午在卦為坎離在方為南北問曰何謂五位相得而各有合答曰天地五十五數故乾得一九合而成十坤得四六合而成十巽兊得二八合而成十震艮得三七合而成十離得五坎得十坎離無偶所以自合也以數言之則得天地之中數以爻言之則得天地之中爻以位言之則得天地之中位坎離不亦大乎問曰何謂五嶽答曰五嶽真形圖曰在人之頭紫清有巾藏五嶽冠之句問曰何謂玄牝答曰在上曰玄在下曰牝玄關一竅左曰玄右曰牝問曰何謂玄牝之門答曰鼻通天氣曰玄門口通地氣曰牝戶口鼻乃玄牝門戶矣問曰何謂三男三女答曰乾道索坤長男曰震中男曰坎少男曰艮坤道索乾長女曰巽中女曰離少女曰兊問曰何謂火龍水虎答曰虎西方金也金生水反藏形於水龍東方木也木生火反受尅於火太白真君曰五行不順行虎向水中生五行顛倒術龍從火裏出是也問曰何謂分至答曰子時象冬至隂極而陽生午時象夏至陽極而隂生卯時象春分陽中含隂酉時象秋分隂中含陽人身亦有分至紫陽曰以身心分上下兩弦以神氣別冬夏二至問曰何謂沐浴答曰真氣薰蒸神水灌溉為沐浴太上曰灌以甘泉滌其垢汚出自華池後歸坤户杏林曰沐浴資神水是也問曰何謂抽添答曰既抽鉛於肘後須添汞於中黃傳道集曰可抽之時不可添是也問曰何謂搬運答曰搬金精於肘後運玉液於泥丸下手工夫口訣存焉問曰何謂三田答曰腦為上田心為中田氣海為下田若得斗柄之機幹運則上下循環如天河之流轉也問背後三關答曰腦後曰玉枕關夾脊曰轆轤關水火之際曰尾閭關問曰何謂神室答曰元神所居之室也朗然子曰未明心室千般撓逹了心田萬事間問曰何謂三花聚頂答曰种氣精混而為一也玄關一竅乃神氣精之聚也問五氣朝元答曰五臟真氣上朝於天元也問和合四象答曰眼不視而魂在肝耳不聞而精在腎舌不動而神在心鼻不嗅而魄在肺精神魂魄聚於意土也問曰馬牙真主人神符白雪答曰皆鉛汞之總名也問曰河車答曰北方正氣名曰河車左曰日輪右曰月輪搬運正氣運在元陽應節順行下手無非此車之力問老嫩何也答曰採藥之時審其老嫩彭鶴林曰嫩時須採老時枯紫陽曰鉛見癸生須急採金逢望遠不堪嘗是也問浮沉答曰鉛浮而銀沉也問清濁答曰隂濁而陽清也清者浮之於上濁者沉之於下修丹者留清去濁屬隂也問五行相尅答曰金碧經云金木相伐水火相尅土旺金鄉三物俱喪四海輻輳以致太平並由中宫土德之功也問曰往來何也答曰子往午來隂符陽火自子進符至辰巳自午退符至戌玄始復終坤皆以卦象則之一消一長一往一來以成其變化易曰闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通也問雌雄答曰雌隂雄陽也一隂一陽謂之道孤隂寡陽不能自生參同契曰雌雄相錯以類相求注曰雄金砂也雌火汞也相須合吐類聚生成以為神藥也問曰防危答曰防火候之差失忌夢寐之昏迷翠虛曰精生有時時至神知百刻之中切忌昏迷問交合答曰磁石吸鐵隔礙潛通問有無答曰金碧經云有無互相制上有青龍居兩無宗一有靈化妙難窺問刑德答曰陽為德德則出萬物生隂為刑刑則出萬物死故二月陽中含隂而榆莢落象金砂隨隂氣動靜落在胎中故曰歸根也八月隂中含陽而薺麥生象金水隨陽氣滋液於鼎內故卯酉乃刑德相負隂陽兩停故息符火也問黑白答曰參同契曰知白守黑神明自來白者金也黑者水也以金水之根而為藥基矣問寒暑答曰真一子云不應候風雨不調水旱相伐或陽火過刻或隂符失節凝冬變為大暑盛夏反作濃霜火候過差靈汞飛走運火之士可不謹之問晦朔答曰參同契曰晦朔之間合符中行乃金水符合之際也問固濟答曰太真云固濟胎不泄變化在須臾言其水火既濟閉固神室而不可使之泄漏問聖胎答曰無質生質結成聖胎辛動保護十月如幼女之初懷孕似小龍飬珠蓋神氣始凝結極易踈失也問四正答曰子午卯酉為四正玄關一竅為四正宫也問黃庭正在何處答曰在膀胱之上脾之下腎之前肝之左肺之右也問金烏玉兔答曰日中烏比心中液也月中兔比腎中之氣也問鍊形答曰鍊形化氣鍊氣化神錬神合道也金洞主曰以精鍊形非凡砂石問張紫陽曰心腎非坎離何也答曰心腎特坎離之體耳有體有用問所有者何也答曰天心乃心之用也屬離形乃腎之用也屬坎交媾之際運用於此矣問功夫答曰知時而交媾進火而防危陽生而野戰刑德而沐浴以至溫養成丹也問野戰答曰龍虎上經曰文以懷柔武以討叛紫陽曰守城野戰知凶吉增得靈砂滿鼎紅問溫飬答曰杏林云溫飬象周星毗陵曰金鼎常留湯用暖玉罏不要火教寒是也問烹鍊答曰烹金鼎鍊玉罏口訣存馬問賞罰答曰春氣發生謂之賞乃巳前陽火之候也秋氣殺物謂之罰乃午後隂符之候也問守城答曰抱元守一而凝神聚氣也問隄防答曰驅除雜念而專心不二也問神廬者何也答曰鼻也乃神氣出入之門黃庭經云神廬之中當修治呼吸廬間入丹田問太一含真答曰守真一於天谷氣入玄元即逹本來天真答上曰真道飬神若能守我在死氣之關今七祖枯骨皆在生氣生我者道活我者神將神守道以道飬神是也問三尸答曰中黃經云一者上蟲居腦中二者中蟲居明堂三者下蟲居腹胃名曰彭琚彭質彭矯也惡人進道喜人退志上田乃元神所居之宫惟人不能開此關被尸蟲居之生死輪回無有了期若能握元神棲于本宫則尸蟲自滅真息自定所謂一竅開而百竅齊開大關通而百體盡通則天真降靈不神之神所以神也問胎息答曰能守真一則息不往來如在母胞胎之中謂之大定也問玉池答曰口也黃庭經云玉池清水灌靈根是也問槖籥答曰橐乃無底囊籥乃三孔笛又是鐵匠手中所弄鼓風之物也老子曰天地之問其猶槖籥乎升降論曰人能效天地槖籥之用開則氣出合則氣入出則如地氣之上升入則如天氣之下降一升一降自可與天地齊長久矣問五芽答曰乃五臟之真氣中黃經曰子能守之三蟲棄得見五芽九真氣問屯蒙答曰道樞云坎者水也一變為水澤之節再變為水雷之屯其爻居寅離者火也一變為火山之旅再變為火風之鼎三變為山水之蒙其爻居戌抽添水火在於寅戌十二卦氣在於屯蒙運用也問採日精月華答曰非外之日月也採心中真液腎中真氣也問內外八卦答曰頭為乾足為坤膀胱為艮膽為巽腎為坎心為離肝為震肺為兊也問修鍊待時然後下手答曰有時中之工夫有刻中之工夫毗陵曰鍊丹不用尋冬至心中自有一陽生馬自然曰不擇時中分子午無爻卦內别乾坤此皆刻中之工夫也問金丹形像如何答曰形若彈丸色同朱橘抱朴子曰大如彈丸黃如橘中有佳味甘如密沙門得之即禪定黃衣得之即超逸審之行之天地畢元樞歌曰君不見一粒金丹何赫赫大如彈子黃如橘人人分上本圓成夜夜靈光長滿室蓋人人具足箇箇圓成當知非有形之物也吕公曰還丹本質也問玄關一竅正在何處答曰在人之首功夫容易見下手的難尋若不遇真師摩頂授記皆妄為矣問真空答曰返本還元為真空杏林曰不知丹訣妙終日玩真空問作用答曰螟蛉呪子傳精送神問出神答曰能守真一真氣自凝陽神自聚蓋以一心運諸氣氣住則神住真積力久功行滿然後調神出殼也問超脫答曰超者出也脫者脫換凡軀也皆天門出前聖有脫殼之驗六祖七層寶塔出鍾吕七級紅樓出海蟾公鶴衝天門出詩曰功成須是出神京內院繁華勿纍身會取五仙超脫法鍊成仙質離凡塵問尸解答曰尸解有五金木水火土也又有積功纍行而白日飛升者徽宗皇帝尊道篇末曰亘古逮今飛升者千有餘人拔宅者八十餘家出真誥問金丹之道不亦難乎答曰是不難也悟者惟簡惟易迷者愈繁愈難杏林云簡易之語不過半句證驗之效只在片時翠虛曰藥之不遠採不難毗陵曰皇道不繁人自昧紫清曰只一言貫穿萬卷仙經但片餉工夫無窮逸樂師曰下手工夫容易堅心守道為難也養生祕録
